<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Media Escolar</title>
</head>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #e5e5e5;
    font-family: Arial, sans-serif;
}

.card{
    width: 100%;
    max-width: 400px;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h1{
    text-align: center;
    margin-bottom: 25px;
    color: #111;
}

.grupo{
    display: flex;
    flex-direction: column;
    margin-bottom: 18px;
}

label{
    margin-bottom: 6px;
    font-weight: bold;
    color: #333;
}

input{
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 15px;
}

button{
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #222;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover{
    background: #444;
}

#resultado{
    margin-top: 20px;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
    font-weight: bold;
    display: none;
}


.aprovado { background: #dbeafe; color: #1e40af; }

.exame    { background: #dcfce7; color: #166534; }

.reprovado{
    background: #fee2e2;
    color: #991b1b;
}
</style>

<body>      
    <div class="card">
    <h1>Média Escolar</h1>

    <div class="grupo">
        <label>Digite a nota 1:</label>
        <input type="number" id="nota1" placeholder="Nota 1">
    </div>

    <div class="grupo">
        <label>Digite a nota 2:</label>
        <input type="number" id="nota2" placeholder="Nota 2">
    </div>

    <div class="grupo">
        <label>Digite a nota 3:</label>
        <input type="number" id="nota3" placeholder="Nota 3">
    </div>

    <button id="calcular">Calcular Média</button>

    <div id="resultado"></div>
</div>
<script src="Media(JS).js"></script>
</body>
</html>
