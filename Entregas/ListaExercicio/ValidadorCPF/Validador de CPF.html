<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Validador de CPF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />

  <style>
    body{
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f4f4f4;
  font-family: Arial, sans-serif;
}

.card{
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 350px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h1{
  margin-bottom: 10px;
}

.subtitulo{
  color: #666;
  font-size: 14px;
  margin-bottom: 20px;
}

.grupo label{
  display: block;
  margin-bottom: 8px;
  font-weight: bold;
}

.input-wrap{
  display: flex;
  align-items: center;
  gap: 10px;
  border: 1px solid #ccc;
  padding: 10px;
  border-radius: 8px;
  background: #fafafa;
}

.input-wrap input{
  border: none;
  outline: none;
  width: 100%;
  background: transparent;
  font-size: 16px;
}

button{
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #222;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover{
  background: #444;
}

#resultado{
  margin-top: 20px;
  padding: 12px;
  border-radius: 8px;
  font-weight: bold;
  text-align: center;
}

.valido{
  background: #d4edda;
  color: #155724;
  border: 1px solid #28a745;
}

.invalido{
  background: #f8d7da;
  color: #721c24;
  border: 1px solid #dc3545;
}

.oculto{
  display: none;
}

.rodape{
  margin-top: 20px;
  font-size: 12px;
  color: #777;
  text-align: center;
}
   </style>
</head>
<body>

  <div class="card">
    <span class="tag">BR · Receita Federal</span>

    <h1>Validador<br>de CPF</h1>
    <p class="subtitulo">
      Informe um CPF para verificar a autenticidade dos dígitos verificadores.
    </p>

    <div class="grupo">
      <label for="cpf-input">Número do CPF</label>
      <div class="input-wrap">
        <!-- ícone de ID -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="16" rx="2"/>
          <circle cx="9" cy="10" r="2"/>
          <path d="M15 8h2M15 12h2M7 16h10"/>
        </svg>
        <input
          id="cpf-input"
          type="text"
          inputmode="numeric"
          maxlength="14"
          placeholder="000.000.000-00"
          autocomplete="off"
        />
      </div>
    </div>

    <button id="btn-validar">Validar CPF</button>

    <div id="resultado" class="oculto">
      <div id="resultado-icone"></div>
      <div class="resultado-info">
        <span id="resultado-texto"></span>
        <span id="resultado-detalhe"></span>
      </div>
    </div>

    <div class="rodape">
      <div class="dot"></div>
      Algoritmo Módulo 11 · apenas validação de formato
    </div>
  </div>

  <script src="CPF.js"></script>
</body>
</html>
