<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinity Bank</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #e5e7eb;
    font-family: Arial, sans-serif;
}

.card{
    width: 100%;
    max-width: 420px;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h1{
    text-align: center;
    margin-bottom: 25px;
    color: #111827;
}

.grupo{
    display: flex;
    flex-direction: column;
    margin-bottom: 18px;
}

label{
    margin-bottom: 6px;
    font-weight: bold;
    color: #374151;
}

input,
select{
    padding: 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
}

button{
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #111827;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover{
    background: #374151;
}

#resultado{
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    background: #f3f4f6;
    display: none;
    line-height: 1.8;
}
</style>
</head>

<body>

<div class="card">

    <h1>Infinity Bank</h1>

    <div class="grupo">
        <label>Bandeira do Cartão</label>

        <select id="bandeira">
            <option value="">Selecione</option>
            <option value="visa">Visa</option>
            <option value="master">Master</option>
            <option value="elo">Elo</option>
        </select>
    </div>

    <div class="grupo">
        <label>Valor da Venda</label>
        <input type="number" id="valor" placeholder="Digite o valor">
    </div>

    <div class="grupo">
        <label>Quantidade de Parcelas</label>
        <input type="number" id="parcelas" placeholder="Digite as parcelas">
    </div>

    <button id="calcular">Calcular</button>

    <div id="resultado"></div>

</div>

<script src="InfinityBank(JS).js"></script>
</body>
</html>
